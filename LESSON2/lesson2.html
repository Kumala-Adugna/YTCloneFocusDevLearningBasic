<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of CSS</title>
    <style>
        .Uber-button {
            background-color: black;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 25px;
        }
        .Amazon-button {
            background-color: rgba(255, 216, 20 );
            color: rgb(0, 0, 0);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            width: 200px;
            margin-left: 26px;

        }
        .Github-button {
            background-color: rgb(46, 164, 79);
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 7px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 6px;
            height: 50px;
            width: 120px;
            margin-left: 30px;

        }
        .Bootsrap-button {
            background-color: rgb(121, 82, 179);
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .Download-button {
            background-color: white;
            color: rgb(108,117,115);
            padding:15px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .LinkedIn-button {
            background-color: rgb(10, 102, 194);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 50px;
        }
        .Save-button {
            background-color: rgb(255, 255, 255);
            color: rgb(10, 102, 194);
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <button class="Uber-button">Request Now</button>
    <button class="Amazon-button">Add to Cart</button>
    <button class="Github-button">Sign Up</button>
    <br>
    <button class="Bootsrap-button">Get Started</button>
    <button class="Download-button">Download</button>
    <button class="LinkedIn-button">Apply on company website</button>
     <button class="Save-button">Save</button>
    
</body>
</htm
